<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>대출 이자 계산기 | 올인원 정산 계산기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #07111f; --bg-2: #0b1729; --surface: rgba(255, 255, 255, 0.06); --line: rgba(255, 255, 255, 0.08); --text: #f5f8ff; --muted: #a8b6d4; --primary: #78a8ff; --primary-3: #4d85ff; --radius-xl: 28px; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    [data-theme="light"] { --bg: #f8fafc; --bg-2: #ffffff; --surface: rgba(0, 0, 0, 0.04); --line: rgba(0, 0, 0, 0.08); --text: #1e293b; --muted: #64748b; --primary: #2563eb; --primary-3: #1d4ed8; }
    body { margin: 0; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
    .app-shell { width: min(100%, 520px); margin: 0 auto; padding-bottom: 80px; }
    .top-appbar { position: sticky; top: 0; z-index: 20; padding: 14px 16px; background: var(--surface); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); }
    
    /* GNB Style */
    .gnb-nav { position: sticky; top: 67px; z-index: 19; background: var(--bg-2); border-bottom: 1px solid var(--line); overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
    .gnb-nav::-webkit-scrollbar { display: none; }
    .gnb-list { display: flex; padding: 0 16px; margin: 0; list-style: none; }
    .gnb-item { display: inline-block; padding: 14px 12px; color: var(--muted); font-size: 0.95rem; font-weight: 500; text-decoration: none; position: relative; }
    .gnb-item.active { color: var(--primary); font-weight: 800; }
    .gnb-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--primary); }

    .card { border-radius: var(--radius-xl); background: var(--bg-2); border: 1px solid var(--line); margin-top: 18px; overflow: hidden; }
    .card-inner { padding: 18px; }
    .btn { border: 0; border-radius: 16px; padding: 15px; font-weight: 800; cursor: pointer; width: 100%; }
    .btn-primary { color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary-3)); }
    .back-btn { display: inline-block; color: var(--primary); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-appbar">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <a href="index.html" class="back-btn">← 홈으로</a>
        <h1 style="font-size: 1rem; margin: 0;">올인원 계산기</h1>
        <div></div>
      </div>
    </header>

    <nav class="gnb-nav">
      <div class="gnb-list">
        <a href="loan.html" class="gnb-item active">대출 계산기</a>
        <a href="installment.html" class="gnb-item">할부 계산기</a>
        <a href="interest.html" class="gnb-item">이자 계산기</a>
        <a href="vat.html" class="gnb-item">부가세 계산기</a>
        <a href="margin.html" class="gnb-item">마진율 계산기</a>
        <a href="fee.html" class="gnb-item">수수료 계산기</a>
        <a href="exchange.html" class="gnb-item">정산 계산기</a>
        <a href="faq.html" class="gnb-item">도움말/FAQ</a>
      </div>
    </nav>

    <main style="padding: 0 16px;">
      <section id="loan" class="section">
        <div class="card">
          <div class="card-inner">
            <h3 class="panel-title">입력 조건</h3>
            <div class="form-grid" style="display: grid; gap: 12px;">
              <div class="field">
                <label>대출금액(원)</label>
                <input id="loanAmount" type="text" value="30,000,000" />
              </div>
              <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="field"><label>연이율(%)</label><input id="loanRate" type="number" value="5.2" /></div>
                <div class="field"><label>기간(개월)</label><input id="loanMonths" type="number" value="36" /></div>
              </div>
              <div class="field">
                <label>상환방식</label>
                <select id="repaymentType">
                  <option value="annuity">원리금균등상환</option>
                  <option value="equalPrincipal">원금균등상환</option>
                  <option value="bullet">만기일시상환</option>
                </select>
              </div>
              <button class="btn btn-primary" id="loanCalcBtn">계산하기</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-inner">
            <h3 class="panel-title">계산 결과</h3>
            <div id="resultArea">
              <p>월 납입액: <strong id="loanMonthly">-</strong></p>
              <p>총 이자: <strong id="loanTotalInterest">-</strong></p>
              <p>총 상환액: <strong id="loanTotalPayment">-</strong></p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function formatKRW(v) { return Math.round(v).toLocaleString() + "원"; }
    function getNumber(id) { return Number(document.getElementById(id).value.replace(/,/g, "")); }
    
    document.getElementById("loanCalcBtn").addEventListener("click", () => {
      const p = getNumber("loanAmount"), r = getNumber("loanRate")/100/12, m = getNumber("loanMonths");
      const t = document.getElementById("repaymentType").value;
      let monthly = 0, totalInterest = 0;
      
      if (t === "annuity") {
        monthly = p * (r * Math.pow(1+r, m)) / (Math.pow(1+r, m) - 1);
        totalInterest = (monthly * m) - p;
      } else if (t === "bullet") {
        monthly = p * r;
        totalInterest = (p * r) * m;
      }
      
      document.getElementById("loanMonthly").textContent = formatKRW(monthly);
      document.getElementById("loanTotalInterest").textContent = formatKRW(totalInterest);
      document.getElementById("loanTotalPayment").textContent = formatKRW(p + totalInterest);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>수수료 계산기 | 올인원 정산 계산기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #07111f; --bg-2: #0b1729; --surface: rgba(255, 255, 255, 0.06); --line: rgba(255, 255, 255, 0.08); --text: #f5f8ff; --muted: #a8b6d4; --primary: #78a8ff; --primary-3: #4d85ff; --radius-xl: 28px; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    [data-theme="light"] { --bg: #f8fafc; --bg-2: #ffffff; --surface: rgba(0, 0, 0, 0.04); --line: rgba(0, 0, 0, 0.08); --text: #1e293b; --muted: #64748b; --primary: #2563eb; --primary-3: #1d4ed8; }
    body { margin: 0; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
    .app-shell { width: min(100%, 520px); margin: 0 auto; padding: 0 16px 80px; }
    .top-appbar { position: sticky; top: 0; z-index: 20; padding: 14px 0; backdrop-filter: blur(20px); display: flex; align-items: center; gap: 12px; }
    .back-btn { font-size: 1.2rem; color: var(--text); text-decoration: none; width: 40px; height: 40px; display: grid; place-items: center; background: var(--surface); border-radius: 12px; border: 1px solid var(--line); }
    .card { border-radius: var(--radius-xl); background: var(--bg-2); border: 1px solid var(--line); margin-top: 18px; overflow: hidden; }
    .card-inner { padding: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 700; color: var(--muted); }
    .field input, .field select { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid var(--line); background: var(--surface); color: var(--text); font-size: 1rem; outline: none; }
    .btn { border: 0; border-radius: 16px; padding: 16px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; transition: var(--transition); }
    .btn-primary { color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary-3)); box-shadow: 0 8px 20px rgba(120, 168, 255, 0.2); }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
    .result-card { background: var(--surface); padding: 14px; border-radius: 18px; border: 1px solid var(--line); text-align: center; }
    .result-card span { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .result-card strong { font-size: 0.95rem; color: var(--primary); }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-appbar">
      <a href="index.html" class="back-btn">←</a>
      <h1 style="font-size: 1.1rem; margin: 0;">수수료 계산기</h1>
    </header>

    <main>
      <div class="card">
        <div class="card-inner">
          <div class="field">
            <label>판매금액(원)</label>
            <input id="salesAmount" type="text" value="1,000,000" inputmode="numeric" />
          </div>
          <div class="field">
            <label>플랫폼 선택</label>
            <select id="platformSelect" onchange="toggleCustom()">
              <option value="3.74">네이버 스마트스토어 (약 3.74%)</option>
              <option value="10.8">쿠팡 (약 10.8%)</option>
              <option value="13">지마켓/옥션 (약 13%)</option>
              <option value="15">11번가 (약 15%)</option>
              <option value="custom">직접 입력</option>
            </select>
          </div>
          <div id="customFeeRow" class="field" style="display:none">
            <label>직접 입력(%)</label>
            <input id="customFeeRate" type="number" value="10" step="0.1" />
          </div>
          <button class="btn btn-primary" onclick="calculate()">계산하기</button>
        </div>
      </div>

      <div class="card">
        <div class="card-inner">
          <h3 style="margin: 0 0 16px; font-size: 1rem;">계산 결과</h3>
          <div class="result-grid">
            <div class="result-card"><span>정산금액</span><strong id="resNet">-</strong></div>
            <div class="result-card"><span>수수료액</span><strong id="resFee">-</strong></div>
            <div class="result-card"><span>수수료율</span><strong id="resRate">-</strong></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function formatKRW(v) { return Math.round(v).toLocaleString() + "원"; }
    function getNum(id) { return Number(document.getElementById(id).value.replace(/,/g, "")); }

    document.querySelectorAll('input[inputmode="numeric"]').forEach(el => {
      el.addEventListener('input', e => {
        let v = e.target.value.replace(/[^0-9]/g, "");
        e.target.value = v ? Number(v).toLocaleString() : "";
      });
    });

    function toggleCustom() {
      document.getElementById("customFeeRow").style.display = document.getElementById("platformSelect").value === "custom" ? "block" : "none";
    }

    function calculate() {
      const sales = getNum("salesAmount");
      const platform = document.getElementById("platformSelect").value;
      let rate = platform === "custom" ? Number(document.getElementById("customFeeRate").value) : Number(platform);
      
      const feeAmount = sales * (rate / 100);
      const net = sales - feeAmount;

      document.getElementById("resNet").textContent = formatKRW(net);
      document.getElementById("resFee").textContent = formatKRW(feeAmount);
      document.getElementById("resRate").textContent = rate.toFixed(2) + "%";
    }
    
    calculate();
  </script>
</body>
</html>

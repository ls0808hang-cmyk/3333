<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또번호 자동생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <button id="theme-toggle" class="theme-toggle" type="button">라이트 모드</button>
        <p class="eyebrow">LUCKY PICK 6/45</p>
        <h1>로또번호 자동생성기</h1>
        <p class="description">
            1부터 45까지의 숫자 중 메인 번호 6개와 보너스볼 1개를 중복 없이 자동 생성합니다.
        </p>

        <section class="control-panel" aria-label="생성 설정">
            <label class="pick-count-label" for="pick-count">생성 세트 수</label>
            <select id="pick-count" class="pick-count">
                <option value="1">1세트</option>
                <option value="3">3세트</option>
                <option value="5">5세트</option>
            </select>
            <button id="generator-btn" type="button">번호 생성하기</button>
        </section>

        <section class="result-panel" aria-live="polite">
            <div class="result-head">
                <h2>추천 번호</h2>
                <p id="result-meta">아직 번호가 생성되지 않았습니다.</p>
            </div>
            <div id="lotto-numbers-container" class="lotto-numbers-container"></div>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
